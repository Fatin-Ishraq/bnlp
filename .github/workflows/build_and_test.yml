# This workflow installs Python dependencies, builds the Rust extension,
# and runs tests across multiple Python versions and operating systems.

name: Build and Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust artifacts
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: bnlp_rust -> target

    - name: Install maturin
      run: python -m pip install maturin

    - name: Build and install Rust extension
      run: |
        cd bnlp_rust
        maturin develop --release

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install pytest
        python -m pip install -r requirements.txt

    - name: Run tests
      run: |
        python -m pytest tests/ -q --tb=short

  # Also test pure Python fallback (no Rust)
  test-pure-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install pytest
        python -m pip install -r requirements.txt

    - name: Run tests (pure Python, no Rust)
      run: |
        python -m pytest tests/ -q --tb=short
