# Build and publish bnlp + bnlp_rust wheels to PyPI when a release is created.
# Uses maturin-action to build cross-platform Rust wheels automatically.

name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  # Build Rust wheels for all platforms using maturin-action
  build-rust-wheels:
    name: Build Rust wheel (${{ matrix.platform }} / Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - os: ubuntu-latest
            platform: linux
            python-version: "3.9"
            target: x86_64
          - os: ubuntu-latest
            platform: linux
            python-version: "3.10"
            target: x86_64
          - os: ubuntu-latest
            platform: linux
            python-version: "3.11"
            target: x86_64
          - os: ubuntu-latest
            platform: linux
            python-version: "3.12"
            target: x86_64
          - os: ubuntu-latest
            platform: linux
            python-version: "3.13"
            target: x86_64
          # macOS
          - os: macos-latest
            platform: macos
            python-version: "3.9"
            target: aarch64
          - os: macos-latest
            platform: macos
            python-version: "3.10"
            target: aarch64
          - os: macos-latest
            platform: macos
            python-version: "3.11"
            target: aarch64
          - os: macos-latest
            platform: macos
            python-version: "3.12"
            target: aarch64
          - os: macos-latest
            platform: macos
            python-version: "3.13"
            target: aarch64
          # macOS Intel
          - os: macos-13
            platform: macos-intel
            python-version: "3.12"
            target: x86_64
          # Windows
          - os: windows-latest
            platform: windows
            python-version: "3.9"
            target: x86_64
          - os: windows-latest
            platform: windows
            python-version: "3.10"
            target: x86_64
          - os: windows-latest
            platform: windows
            python-version: "3.11"
            target: x86_64
          - os: windows-latest
            platform: windows
            python-version: "3.12"
            target: x86_64
          - os: windows-latest
            platform: windows
            python-version: "3.13"
            target: x86_64

    steps:
    - uses: actions/checkout@v4

    - name: Build Rust wheel
      uses: PyO3/maturin-action@v1
      with:
        working-directory: bnlp_rust
        target: ${{ matrix.target }}
        manylinux: auto
        command: build
        args: --release --interpreter python${{ matrix.python-version }}

    - name: Upload Rust wheel artifact
      uses: actions/upload-artifact@v4
      with:
        name: bnlp_rust-${{ matrix.platform }}-cp${{ matrix.python-version }}-${{ matrix.target }}
        path: bnlp_rust/target/wheels/*.whl

  # Build the pure Python bnlp_toolkit wheel
  build-python-wheel:
    name: Build pure Python wheel
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"
    - name: Install build
      run: python -m pip install --upgrade pip build
    - name: Build package
      run: python -m build
    - name: Upload Python wheel artifact
      uses: actions/upload-artifact@v4
      with:
        name: bnlp_toolkit-pure-python
        path: dist/*

  # Publish all wheels to PyPI
  publish:
    name: Publish to PyPI
    needs: [build-rust-wheels, build-python-wheel]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
    - name: Download all wheel artifacts
      uses: actions/download-artifact@v4
      with:
        path: dist
        merge-multiple: true

    - name: List wheels
      run: ls -la dist/

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        user: __token__
        password: ${{ secrets.PYPI_BNLP_API_TOKEN }}
